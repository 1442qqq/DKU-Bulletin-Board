<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>안녕하세요!</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
        }

        body {
            background-color: #0b1a3a; /* 남색 */
            color: #f2f6ff; /* 밝은 글씨 */
            height: 200vh; /* 스크롤 생기게 */
            display: flex;
            flex-direction: column;
            align-items: center;
            scroll-behavior: smooth;
        }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            animation: fadeIn 1.8s ease;
        }

        .hero h1 {
            font-size: clamp(48px, 8vw, 96px);
            font-weight: 700;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: clamp(18px, 3vw, 28px);
            opacity: 0.85;
        }

        .footer {
            margin-top: auto;
            padding: 40px 20px;
            text-align: center;
            color: #9aa4c3; /* 회색 */
            font-size: 14px;
            opacity: 0.8;
        }

        .footer a {
            color: inherit;
            text-decoration: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .footer {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1>안녕하세요!</h1>
        <p>현재 진행중인 페이지입니다.</p>
    </section>
    <!-- DB 조회 테스트-->
    <h1>게시글 목록 조회 테스트</h1>

    <!-- 데이터가 하나라도 있는지 확인 -->
    {% if users %}
        <ul>
            {% for user in users %}
                <li>
                    <strong>ID:</strong> {{ user.id }}
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>DB에 저장된 데이터가 없습니다. (수파베이스에서 직접 데이터를 넣어보세요!)</p>
    {% endif %}

    <button onclick="location.reload()">새로고침</button>

    <section class="footer">
        아래를 확인하세요:
        <br />
        <a href="https://github.com/1442qqq/DKU-Bulletin-Board" target="_blank">
            https://github.com/1442qqq/DKU-Bulletin-Board
        </a>
    </section>

</body>
</html>
